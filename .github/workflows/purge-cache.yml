name: Purge jsDelivr Cache

on:
  # 定时触发：每6小时执行一次
  schedule:
    - cron: '0 */6 * * *'
  # 手动触发：允许在 Actions 页面手动运行
  workflow_dispatch:
  # 当 update.json 被推送到 main 分支时自动触发
  push:
    branches:
      - main
    paths:
      - 'update.json'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from update.json
        id: get_version
        run: |
          VERSION=$(jq -r .version update.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "检测到版本: $VERSION"

      - name: Purge jsDelivr cache for current version
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          PURGE_URL="https://cdn.jsdelivr.net/gh/longyanbo1224/yuweitek-toolbox@v${VERSION}/update.json"
          echo "正在刷新 CDN 缓存: $PURGE_URL"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PURGE "$PURGE_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP 状态码: $HTTP_STATUS"
          echo "响应内容: $BODY"
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ 缓存刷新成功"
          else
            echo "❌ 缓存刷新失败，状态码: $HTTP_STATUS"
            echo "详细响应: $BODY"
            exit 1
          fi
