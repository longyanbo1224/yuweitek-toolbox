name: Purge jsDelivr Cache

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'update.json'

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr cache for main branch
        run: |
          PURGE_URL="https://cdn.jsdelivr.net/gh/longyanbo1224/yuweitek-toolbox@main/update.json"
          echo "正在刷新 CDN 缓存: $PURGE_URL"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PURGE "$PURGE_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP 状态码: $HTTP_STATUS"
          echo "响应内容: $BODY"
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ]; then
            echo "✅ 缓存刷新请求已接受"
          else
            echo "❌ 缓存刷新请求失败，状态码: $HTTP_STATUS"
            echo "详细响应: $BODY"
            exit 1
          fi

      - name: Verify CDN cache
        run: |
          CDN_URL="https://cdn.jsdelivr.net/gh/longyanbo1224/yuweitek-toolbox@main/update.json"
          echo "验证 CDN 缓存: $CDN_URL"
          HEADERS=$(curl -sI "$CDN_URL")
          AGE=$(echo "$HEADERS" | grep -i '^age:' | awk '{print $2}')
          X_CACHE=$(echo "$HEADERS" | grep -i '^x-cache:' | awk '{print $2}')
          echo "Age: $AGE"
          echo "X-Cache: $X_CACHE"
          if [ -n "$AGE" ] && [ "$AGE" -gt 300 ]; then
            echo "⚠️ 警告：CDN 缓存 Age 较大 ($AGE 秒)，可能需要更长时间生效"
          else
            echo "✅ CDN 缓存状态正常"
          fi
